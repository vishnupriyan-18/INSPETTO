name: inspetto
description: Tamil Nadu Government Field Visit Inspection Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  # firebase_storage removed as per migration to Cloudinary
  firebase_messaging: ^15.2.4

  # Location & Maps
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Camera & Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Signature
  signature: ^5.5.0

  # Auth
  local_auth: ^2.3.0
  pin_code_fields: ^8.0.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Utils
  shared_preferences: ^2.5.2
  internet_connection_checker: ^3.0.1
  http: ^1.2.2
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat-VariableFont_wght.ttf
